<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Estação Barber</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ===== ADMIN ESPECÍFICO ===== */
        .admin-page {
            min-height: 100vh;
            background: var(--preto);
            padding: 0;
        }

        .admin-header {
            background: var(--preto-card);
            border-bottom: 1px solid var(--borda);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .admin-header-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .admin-header-inner img {
            height: 36px;
        }

        .admin-titulo {
            font-family: var(--font-display);
            font-size: 18px;
            color: var(--dourado);
            letter-spacing: 0.05em;
        }

        .admin-btn-sair {
            background: transparent;
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 8px 18px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.05em;
        }

        .admin-btn-sair:hover {
            background: #e74c3c;
            color: #fff;
        }

        .admin-body {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* Filtros */
        .admin-filtros {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 32px;
            align-items: flex-end;
        }

        .admin-filtros .form-group {
            flex: 1;
            min-width: 160px;
        }

        .admin-filtros .form-group label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--dourado);
            margin-bottom: 8px;
            display: block;
        }

        .admin-filtros select,
        .admin-filtros input {
            background: var(--preto-card);
            border: 1px solid var(--borda);
            border-radius: var(--radius);
            padding: 12px 14px;
            color: var(--branco);
            font-family: var(--font-body);
            font-size: 14px;
            outline: none;
            width: 100%;
            transition: border-color var(--transition);
            appearance: none;
            -webkit-appearance: none;
        }

        .admin-filtros select:focus,
        .admin-filtros input:focus {
            border-color: var(--dourado);
        }

        .btn-filtrar {
            background: var(--dourado);
            color: var(--preto);
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius);
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            align-self: flex-end;
        }

        .btn-filtrar:hover {
            background: var(--dourado-claro);
        }

        /* Estatísticas */
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--preto-card);
            border: 1px solid var(--borda);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            text-align: center;
        }

        .stat-numero {
            font-family: var(--font-display);
            font-size: 36px;
            font-weight: 700;
            color: var(--dourado);
            display: block;
        }

        .stat-label {
            font-size: 12px;
            color: var(--cinza);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 4px;
        }

        /* Tabela */
        .admin-tabela-wrap {
            overflow-x: auto;
            border-radius: var(--radius-lg);
            border: 1px solid var(--borda);
        }

        .admin-tabela {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .admin-tabela thead {
            background: var(--preto-card);
        }

        .admin-tabela th {
            padding: 14px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--dourado);
            border-bottom: 1px solid var(--borda);
            white-space: nowrap;
        }

        .admin-tabela td {
            padding: 14px 16px;
            color: var(--cinza);
            border-bottom: 1px solid rgba(201,168,76,0.08);
            vertical-align: middle;
        }

        .admin-tabela tr:last-child td {
            border-bottom: none;
        }

        .admin-tabela tbody tr {
            transition: background var(--transition);
        }

        .admin-tabela tbody tr:hover {
            background: var(--preto-card);
        }

        .admin-tabela td strong {
            color: var(--branco);
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .badge-confirmado { background: rgba(46,204,113,0.15); color: #2ecc71; }
        .badge-cancelado  { background: rgba(231,76,60,0.15);  color: #e74c3c; }
        .badge-pendente   { background: rgba(241,196,15,0.15); color: #f1c40f; }

        .btn-cancelar-admin {
            background: transparent;
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 5px 12px;
            border-radius: var(--radius);
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-cancelar-admin:hover {
            background: #e74c3c;
            color: #fff;
        }

        .admin-vazio {
            text-align: center;
            padding: 60px 20px;
            color: var(--cinza);
            font-size: 15px;
        }

        /* Login admin */
        #adminLogin {
            display: none;
        }

        #adminLogin .login-card {
            max-width: 380px;
        }

        @media (max-width: 600px) {
            .admin-filtros { flex-direction: column; }
            .admin-tabela { font-size: 13px; }
            .admin-tabela th, .admin-tabela td { padding: 10px 12px; }
        }
    </style>
</head>
<body>

<!-- LOGIN ADMIN -->
<div id="adminLogin">
    <div class="login-card">
        <div class="login-logo">
            <img src="logo.png" alt="Estação Barber" onerror="this.style.display='none'">
            <h2>Estação Barber</h2>
        </div>
        <h3 class="aba-titulo">ACESSO ADMIN</h3>

        <div class="form-group">
            <label for="adminEmail">Email</label>
            <input type="email" id="adminEmail" placeholder="admin@barbearia.com">
        </div>
        <div class="form-group">
            <label for="adminPassword">Senha</label>
            <input type="password" id="adminPassword" placeholder="••••••••">
        </div>
        <button onclick="loginAdmin()" class="btn-submit">Entrar como Admin</button>

        <p class="troca-aba" style="margin-top:16px;">
            <a href="index.html" style="color:var(--cinza);">← Voltar ao site</a>
        </p>
    </div>
</div>

<!-- PAINEL ADMIN -->
<div id="adminApp" style="display:none;" class="admin-page">

    <div class="admin-header">
        <div class="admin-header-inner">
            <div style="display:flex; align-items:center; gap:16px;">
                <img src="logo.png" alt="Estação Barber" onerror="this.style.display='none'">
                <span class="admin-titulo">Painel Administrativo</span>
            </div>
            <div style="display:flex; gap:12px; align-items:center;">
                <a href="index.html" style="font-size:13px; color:var(--cinza);">← Site</a>
                <button onclick="fazerLogout()" class="admin-btn-sair">Sair</button>
            </div>
        </div>
    </div>

    <div class="admin-body">

        <!-- Estatísticas -->
        <div class="admin-stats" id="adminStats">
            <div class="stat-card">
                <span class="stat-numero" id="statTotal">—</span>
                <span class="stat-label">Total de Agendamentos</span>
            </div>
            <div class="stat-card">
                <span class="stat-numero" id="statHoje">—</span>
                <span class="stat-label">Hoje</span>
            </div>
            <div class="stat-card">
                <span class="stat-numero" id="statJoao">—</span>
                <span class="stat-label">João</span>
            </div>
            <div class="stat-card">
                <span class="stat-numero" id="statMatheus">—</span>
                <span class="stat-label">Matheus</span>
            </div>
        </div>

        <!-- Filtros -->
        <div class="admin-filtros">
            <div class="form-group">
                <label>Barbeiro</label>
                <select id="filtroBarbeiro">
                    <option value="">Todos</option>
                    <option value="João">João</option>
                    <option value="Matheus">Matheus</option>
                </select>
            </div>
            <div class="form-group">
                <label>Data</label>
                <input type="date" id="filtroData">
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="filtroStatus">
                    <option value="">Todos</option>
                    <option value="confirmado">Confirmado</option>
                    <option value="cancelado">Cancelado</option>
                </select>
            </div>
            <button class="btn-filtrar" onclick="carregarAgendamentosAdmin()">Filtrar</button>
        </div>

        <!-- Tabela -->
        <div class="admin-tabela-wrap">
            <table class="admin-tabela">
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Barbeiro</th>
                        <th>Serviço</th>
                        <th>Data</th>
                        <th>Horário</th>
                        <th>Status</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="adminTabela">
                    <tr><td colspan="7" class="admin-vazio">Carregando...</td></tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<script src="scripts.js"></script>
<script>
    // Inicialização da página admin
    document.addEventListener("DOMContentLoaded", async () => {
        const { data } = await supabase.auth.getSession();
        if (data.session) {
            document.getElementById("adminLogin").style.display = "none";
            document.getElementById("adminApp").style.display = "block";
            await carregarAgendamentosAdmin();
        } else {
            document.getElementById("adminLogin").style.display = "flex";
            document.getElementById("adminApp").style.display = "none";
        }
    });

    async function loginAdmin() {
        const email = document.getElementById("adminEmail").value.trim();
        const password = document.getElementById("adminPassword").value;

        if (!email || !password) { alert("Preencha email e senha."); return; }

        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) { alert("Email ou senha incorretos."); return; }

        document.getElementById("adminLogin").style.display = "none";
        document.getElementById("adminApp").style.display = "block";
        await carregarAgendamentosAdmin();
    }

    async function carregarAgendamentosAdmin() {
        const barbeiro = document.getElementById("filtroBarbeiro").value;
        const data = document.getElementById("filtroData").value;
        const status = document.getElementById("filtroStatus").value;

        let query = supabase
            .from("agendamentos")
            .select("*")
            .order("data", { ascending: true })
            .order("hora", { ascending: true });

        if (barbeiro) query = query.eq("barbeiro", barbeiro);
        if (data)     query = query.eq("data", data);
        if (status)   query = query.eq("status", status);

        const { data: agendamentos, error } = await query;

        if (error) {
            console.error(error);
            document.getElementById("adminTabela").innerHTML =
                '<tr><td colspan="7" class="admin-vazio">Erro ao carregar dados.</td></tr>';
            return;
        }

        atualizarEstatisticas(agendamentos);
        renderizarTabela(agendamentos);
    }

    function atualizarEstatisticas(agendamentos) {
        const hoje = new Date().toISOString().split("T")[0];
        document.getElementById("statTotal").textContent   = agendamentos.length;
        document.getElementById("statHoje").textContent    = agendamentos.filter(a => a.data === hoje).length;
        document.getElementById("statJoao").textContent    = agendamentos.filter(a => a.barbeiro === "João").length;
        document.getElementById("statMatheus").textContent = agendamentos.filter(a => a.barbeiro === "Matheus").length;
    }

    function renderizarTabela(agendamentos) {
        const tbody = document.getElementById("adminTabela");

        if (!agendamentos || agendamentos.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="admin-vazio">Nenhum agendamento encontrado.</td></tr>';
            return;
        }

        tbody.innerHTML = agendamentos.map(a => `
            <tr>
                <td><strong>${a.nome}</strong></td>
                <td>${a.barbeiro}</td>
                <td>${a.servico}</td>
                <td>${formatarData(a.data)}</td>
                <td>${a.hora}</td>
                <td>
                    <span class="badge badge-${a.status || 'confirmado'}">
                        ${a.status || 'confirmado'}
                    </span>
                </td>
                <td>
                    ${a.status !== 'cancelado'
                        ? `<button class="btn-cancelar-admin" onclick="cancelarAdmin(${a.id})">Cancelar</button>`
                        : '—'
                    }
                </td>
            </tr>
        `).join("");
    }

    async function cancelarAdmin(id) {
        if (!confirm("Cancelar este agendamento?")) return;

        const { error } = await supabase
            .from("agendamentos")
            .delete()
            .eq("id", id);

        if (error) { alert("Erro ao cancelar."); return; }

        await carregarAgendamentosAdmin();
    }
</script>

</body>
</html>
