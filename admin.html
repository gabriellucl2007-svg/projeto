<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Estação Barber</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--dourado:#C9A84C;--preto:#0f0f0f;--card:#1a1a1a;--borda:rgba(201,168,76,0.15);--cinza:#888;--branco:#f5f0e8}
        body{font-family:'Inter',sans-serif;background:var(--preto);color:var(--branco);min-height:100vh}

        #adminLogin{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
        .login-wrap{background:var(--card);border:1px solid var(--borda);border-radius:16px;padding:48px 40px;width:100%;max-width:380px;text-align:center}
        .login-wrap h2{font-family:'Playfair Display',serif;color:var(--dourado);font-size:24px;margin-bottom:8px}
        .login-wrap p{color:var(--cinza);font-size:13px;margin-bottom:28px}
        .inp{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--borda);border-radius:8px;padding:12px 14px;color:var(--branco);font-size:14px;outline:none;margin-bottom:14px;transition:border-color .3s}
        .inp:focus{border-color:var(--dourado)}
        .btn-gold{background:linear-gradient(135deg,#C9A84C,#a8893d);border:none;color:var(--preto);padding:13px;border-radius:8px;font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;width:100%;transition:opacity .2s}
        .btn-gold:hover{opacity:.9}
        .erro-login{color:#e74c3c;font-size:13px;margin-top:10px}

        #adminApp{display:none}
        .adm-header{background:var(--card);border-bottom:1px solid var(--borda);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
        .adm-header h1{font-family:'Playfair Display',serif;color:var(--dourado);font-size:18px}
        .btn-sair{background:transparent;border:1px solid #e74c3c;color:#e74c3c;padding:7px 18px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
        .btn-sair:hover{background:#e74c3c;color:#fff}
        .adm-body{max-width:1100px;margin:0 auto;padding:32px 24px}

        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:32px}
        .stat{background:var(--card);border:1px solid var(--borda);border-radius:12px;padding:20px;text-align:center}
        .stat-n{font-family:'Playfair Display',serif;font-size:36px;color:var(--dourado);display:block}
        .stat-l{font-size:11px;color:var(--cinza);text-transform:uppercase;letter-spacing:.1em;margin-top:4px}

        .filtros{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;align-items:flex-end}
        .filtros label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dourado);display:block;margin-bottom:6px}
        .filtros select,.filtros input{background:var(--card);border:1px solid var(--borda);border-radius:8px;padding:10px 12px;color:var(--branco);font-size:13px;outline:none;width:100%;appearance:none}
        .filtros select:focus,.filtros input:focus{border-color:var(--dourado)}
        .fg{flex:1;min-width:140px}
        .btn-filtrar{background:var(--dourado);color:var(--preto);border:none;padding:10px 22px;border-radius:8px;font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;white-space:nowrap;align-self:flex-end}

        .tabela-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--borda)}
        table{width:100%;border-collapse:collapse;font-size:13px}
        thead{background:var(--card)}
        th{padding:13px 16px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dourado);border-bottom:1px solid var(--borda);white-space:nowrap}
        td{padding:13px 16px;color:var(--cinza);border-bottom:1px solid rgba(201,168,76,0.06);vertical-align:middle}
        tbody tr:hover{background:var(--card)}
        tbody tr:last-child td{border-bottom:none}
        td strong{color:var(--branco)}
        .badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;text-transform:uppercase}
        .badge-confirmado{background:rgba(46,204,113,.15);color:#2ecc71}
        .badge-cancelado{background:rgba(231,76,60,.15);color:#e74c3c}
        .btn-del{background:transparent;border:1px solid #e74c3c;color:#e74c3c;padding:4px 12px;border-radius:6px;font-size:12px;cursor:pointer;transition:all .2s}
        .btn-del:hover{background:#e74c3c;color:#fff}
        .vazio{text-align:center;padding:48px;color:var(--cinza)}

        @media(max-width:600px){.filtros{flex-direction:column}.adm-body{padding:20px 16px}}
    </style>
</head>
<body>

<div id="adminLogin">
    <div class="login-wrap">
        <h2>✂ Admin</h2>
        <p>Painel da Estação Barber</p>
        <input class="inp" type="password" id="senhaAdmin" placeholder="Senha de acesso" onkeydown="if(event.key==='Enter')verificarSenha()">
        <button class="btn-gold" onclick="verificarSenha()">Entrar</button>
        <div class="erro-login" id="erroLogin"></div>
    </div>
</div>

<div id="adminApp">
    <div class="adm-header">
        <h1>✂ Estação Barber — Admin</h1>
        <div style="display:flex;gap:12px;align-items:center">
            <a href="index.html" style="font-size:13px;color:var(--cinza);text-decoration:none">← Site</a>
            <button class="btn-sair" onclick="sair()">Sair</button>
        </div>
    </div>

    <div class="adm-body">

        <div class="stats">
            <div class="stat"><span class="stat-n" id="stTotal">—</span><span class="stat-l">Total</span></div>
            <div class="stat"><span class="stat-n" id="stHoje">—</span><span class="stat-l">Hoje</span></div>
            <div class="stat"><span class="stat-n" id="stJoao">—</span><span class="stat-l">João</span></div>
            <div class="stat"><span class="stat-n" id="stMatheus">—</span><span class="stat-l">Matheus</span></div>
        </div>

        <div class="filtros">
            <div class="fg"><label>Barbeiro</label><select id="fBarbeiro"><option value="">Todos</option><option>João</option><option>Matheus</option></select></div>
            <div class="fg"><label>Data</label><input type="date" id="fData"></div>
            <div class="fg"><label>Status</label><select id="fStatus"><option value="">Todos</option><option value="confirmado">Confirmado</option><option value="cancelado">Cancelado</option></select></div>
            <button class="btn-filtrar" onclick="carregar()">Filtrar</button>
        </div>

        <div class="tabela-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Email</th>
                        <th>Barbeiro</th>
                        <th>Serviço</th>
                        <th>Data</th>
                        <th>Hora</th>
                        <th>Status</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="tbody"><tr><td colspan="8" class="vazio">Carregando...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const SENHA_ADMIN = "admin";
    const SUPABASE_URL = "https://vsvlfkddhebxutugtniu.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzdmxma2RkaGVieHV0dWd0bml1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NjYyOTQsImV4cCI6MjA5NjU0MjI5NH0.uOveZk9BJ7WvIgR8E3_Cd65Svq6Nm5r7mfctpxoj3S8";
    const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function verificarSenha() {
        const s = document.getElementById('senhaAdmin').value;
        if (s === SENHA_ADMIN) {
            sessionStorage.setItem('adminOk', '1');
            document.getElementById('adminLogin').style.display = 'none';
            document.getElementById('adminApp').style.display = 'block';
            carregar();
        } else {
            document.getElementById('erroLogin').textContent = 'Senha incorreta.';
        }
    }

    function sair() {
        sessionStorage.removeItem('adminOk');
        location.reload();
    }

    if (sessionStorage.getItem('adminOk') === '1') {
        document.getElementById('adminLogin').style.display = 'none';
        document.getElementById('adminApp').style.display = 'block';
        carregar();
    }

    async function carregar() {
        const barbeiro = document.getElementById('fBarbeiro').value;
        const data     = document.getElementById('fData').value;
        const status   = document.getElementById('fStatus').value;

        let q = _sb.from('agendamentos').select('*').order('data',{ascending:false}).order('hora',{ascending:false});
        if (barbeiro) q = q.eq('barbeiro', barbeiro);
        if (data)     q = q.eq('data', data);
        if (status)   q = q.eq('status', status);

        const { data: rows, error } = await q;
        if (error) { 
            console.error(error);
            document.getElementById('tbody').innerHTML='<tr><td colspan="8" class="vazio">Erro ao carregar.</td></tr>'; 
            return; 
        }

        atualizarStats(rows);
        renderTabela(rows);
    }

    function atualizarStats(rows) {
        const hoje = new Date().toISOString().split('T')[0];
        document.getElementById('stTotal').textContent   = rows.length;
        document.getElementById('stHoje').textContent    = rows.filter(r=>r.data===hoje && r.status==='confirmado').length;
        document.getElementById('stJoao').textContent    = rows.filter(r=>r.barbeiro==='João' && r.status==='confirmado').length;
        document.getElementById('stMatheus').textContent = rows.filter(r=>r.barbeiro==='Matheus' && r.status==='confirmado').length;
    }

    function renderTabela(rows) {
        const tb = document.getElementById('tbody');
        if (!rows || !rows.length) { tb.innerHTML='<tr><td colspan="8" class="vazio">Nenhum agendamento.</td></tr>'; return; }
        tb.innerHTML = rows.map(r=>`
            <tr>
                <td><strong>${r.nome}</strong></td>
                <td>${r.email_cliente||'—'}</td>
                <td>${r.barbeiro}</td>
                <td>${r.servico || '—'}</td>
                <td>${fmt(r.data)}</td>
                <td>${r.hora}</td>
                <td><span class="badge badge-${r.status||'confirmado'}">${r.status||'confirmado'}</span></td>
                <td>${r.status!=='cancelado'?`<button class="btn-del" onclick="cancelarAdmin(${r.id})">Cancelar</button>`:'—'}</td>
            </tr>
        `).join('');
    }

    async function cancelarAdmin(id) {
        if (!confirm('Cancelar este agendamento?')) return;
        const { error } = await _sb.from('agendamentos').update({status:'cancelado'}).eq('id',id);
        if (error) {
            alert('Erro ao cancelar');
            console.error(error);
            return;
        }
        alert('Agendamento cancelado!');
        carregar();
    }

    function fmt(d) {
        if (!d) return '';
        const [a,m,dia]=d.split('-');
        return `${dia}/${m}/${a}`;
    }
</script>
</body>
</html>
