<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Login</h2>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>
</div>

<!-- APP (SITE TODO) -->

    <h1>Estação Barber</h1>
    <button onclick="logout()">Sair</button>
  </header>

  <!-- FORM AGENDAMENTO -->
  <section>
    <h2>Agendar</h2>

    <form id="formAgendamento">

      <input id="nome" placeholder="Nome" required>

      <input id="telefone" placeholder="Telefone">

      <select id="barbeiro">
        <option>João</option>
        <option>Matheus</option>
      </select>

      <select id="servico">
        <option>Corte</option>
        <option>Barba</option>
        <option>Corte + Barba</option>
      </select>

      <input type="date" id="data" required>

      <select id="hora">
        <option>08:00</option>
        <option>09:00</option>
        <option>10:00</option>
        <option>11:00</option>
        <option>14:00</option>
        <option>15:00</option>
        <option>16:00</option>
      </select>

      <button type="submit">Confirmar Agendamento</button>

    </form>

    <div id="lista"></div>
  </section>
